<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08090d"/>
      <stop offset="100%" stop-color="#0d1017"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ee8fa"/>
      <stop offset="50%" stop-color="#80b5ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ee8fa" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#80b5ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="cloudGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ee8fa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="edgeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ee8fa" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#80b5ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="cloudSoftGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="94" ry="94" fill="none" stroke="url(#edgeGlow)" stroke-width="2"/>

  <!-- Cloud shape glow (behind everything) -->
  <path d="M370 180c-8-40-44-70-86-70-38 0-70 24-82 58-4-2-8-3-13-3-26 0-48 22-48 48 0 1 0 2 0 3-22 8-38 30-38 55 0 32 26 58 58 58h220c32 0 58-26 58-58 0-30-23-55-52-57-2-14-8-26-17-34z"
    fill="url(#cloudGlow)" filter="url(#cloudSoftGlow)"/>

  <!-- Cloud shape -->
  <path d="M370 180c-8-40-44-70-86-70-38 0-70 24-82 58-4-2-8-3-13-3-26 0-48 22-48 48 0 1 0 2 0 3-22 8-38 30-38 55 0 32 26 58 58 58h220c32 0 58-26 58-58 0-30-23-55-52-57-2-14-8-26-17-34z"
    fill="none" stroke="url(#cloudGrad)" stroke-width="2.5" opacity="0.6"/>

  <!-- Background glow behind text -->
  <text x="256" y="310" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="160" font-weight="900" fill="#80b5ff" letter-spacing="-6" filter="url(#softGlow)" opacity="0.15">
    r3x
  </text>

  <!-- Main r3x text -->
  <text x="256" y="310" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="160" font-weight="900" fill="url(#textGrad)" letter-spacing="-6" filter="url(#glow)">
    r3x
  </text>

  <!-- "cloud" subtitle -->
  <text x="256" y="360" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="48" font-weight="600" fill="url(#textGrad)" letter-spacing="12" opacity="0.7" filter="url(#glow)">
    cloud
  </text>

  <!-- Underline accent -->
  <rect x="115" y="380" width="282" height="2.5" rx="1.25" fill="url(#textGrad)" opacity="0.4"/>
</svg>
