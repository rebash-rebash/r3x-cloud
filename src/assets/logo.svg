<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ee8fa"/>
      <stop offset="50%" stop-color="#80b5ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ee8fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Cloud outline -->
  <path d="M370 180c-8-40-44-70-86-70-38 0-70 24-82 58-4-2-8-3-13-3-26 0-48 22-48 48 0 1 0 2 0 3-22 8-38 30-38 55 0 32 26 58 58 58h220c32 0 58-26 58-58 0-30-23-55-52-57-2-14-8-26-17-34z"
    fill="none" stroke="url(#cloudGrad)" stroke-width="3" opacity="0.5"/>
  <!-- r3x text -->
  <text x="256" y="310" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="160" font-weight="900" fill="url(#textGrad)" letter-spacing="-6" filter="url(#glow)">r3x</text>
  <!-- cloud subtitle -->
  <text x="256" y="360" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="48" font-weight="600" fill="url(#textGrad)" letter-spacing="12" opacity="0.7">cloud</text>
</svg>
